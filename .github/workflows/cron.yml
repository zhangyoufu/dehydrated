on:
  push:
  schedule:
  - cron: '33 2 * * *'

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v1.1.0
      with:
        fetch-depth: 1
    - run: exec .github/cron.sh
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        IMAGE_PATH: ${{ secrets.IMAGE_PATH }}
