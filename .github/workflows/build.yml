on:
  push:
concurrency: build
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_PATH: docker.io/youfu/dehydrated:latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Install qemu-user-static as binfmt handler
      run: |-
        sudo apt-get update
        sudo apt-get install -y -o=Dpkg::Use-Pty=0 binfmt-support qemu-user-static
    - name: Register BuildKit node
      run: docker buildx create --driver docker-container --use
    - name: Build docker image
      run: docker buildx build --platform linux/amd64,linux/arm64 --tag "$IMAGE_PATH" --build-context dehydrated=dehydrated - < Dockerfile
    - name: Push docker image
      if: github.ref == 'refs/heads/master'
      env:
        REGISTRY_USERNAME: youfu
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      run: |-
        docker login --username "${REGISTRY_USERNAME}" --password "${REGISTRY_PASSWORD}" "${IMAGE_PATH%%/*}"
        docker buildx build --platform linux/amd64,linux/arm64 --tag "$IMAGE_PATH" --build-context dehydrated=dehydrated --push - < Dockerfile
